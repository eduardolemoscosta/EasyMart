<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar e-mail ao Fornecedor</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/tabela.css' %}">
</head>
<body>
    <div class="nav">
        <a href="/">Voltar para Produtos</a> | <a href="/fornecedores/">Fornecedores</a> | <a href="/admin/">Painel Admin</a>
    </div>
    <h1>Enviar e-mail para {{ fornecedor.nome }}</h1>
    <p><strong>Produto:</strong> {{ produto.nome }}</p>
    <p><strong>Email do fornecedor:</strong> {{ fornecedor.email }}</p>

    {% if error %}
        <p style="color: red;">Erro ao enviar: {{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="subject">Assunto:</label><br>
            <input type="text" id="subject" name="subject" value="{{ subject|default:'Pedido de Reposição: ' }}{{ produto.nome }}" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        </div>
        <div>
            <label for="message">Mensagem:</label><br>
            <textarea id="message" name="message" rows="10" style="width: 100%; padding: 8px;">{{ message|default:'Olá ' }}{{ fornecedor.nome }},\n\nPor favor, envie reposição do produto "{{ produto.nome }}".\nQuantidade atual em estoque: {{ produto.quantidade }}.\n\nAtenciosamente,\nEquipe EasyMart</textarea>
            <p id="message-count" style="margin-top: 8px; color: #555;">0 caracteres</p>
        </div>
        <button type="submit" style="margin-top: 10px; padding: 10px 20px;">Enviar E-mail</button>
    </form>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
